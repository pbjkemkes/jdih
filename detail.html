<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Detail Peraturan</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" type="image/png" href="favicon.png">

<link
rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
      
<style>

      .header-title{
        display:flex;
        align-items:center;
        gap:12px;
        margin-top: 40px;
        margin-bottom:15px;
    }

    .header-title img{
        height:48px;
        width:auto;
    }

    .header-title h2{
        margin:0;
        font-weight:600;
        color:#2c3e50;
    }
  
  .container{
    width:80%;
  }
body{
background:#f4f6f9;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-top:40px;
}

.title{
font-family: "DM Serif Display", serif;
font-size:24px;
font-weight:600;
margin-bottom:40px;
color:#2c3e50;
line-height:1.4;
}

.table th{
width:250px;
background:#f8f9fa;
}

.btn-back{
margin-top:15px;
}

/* ================= BADGE STATUS ================= */

.badge-status{
padding:6px 12px;
border-radius:6px;
font-size:12px;
font-weight:600;
display:inline-block;
}

.badge-berlaku{
background:#28a745;
color:white;
}

.badge-tidak{
background:#dc3545;
color:white;
}

.badge-default{
background:#6c757d;
color:white;
}

/* ================= LIST HUBUNGAN ================= */

#hubungan ol{
padding-left:20px;
margin-bottom:0;
}

#hubungan li{
margin-bottom:5px;
}

</style>

</head>

<body>

<div class="container">

    <div class="header-title">

    <img src="logo.png">

    <h2>JDIH Biro PBJ</h2>

  </div>

<div class="card">

<div class="title" id="judul">

Memuat...

</div>

<table class="table table-bordered">

<tr>
<th>Jenis Peraturan</th>
<td id="jenis"></td>
</tr>

<tr>
<th>Pemrakarsa</th>
<td id="pemrakarsa"></td>
</tr>

<tr>
<th>Nomor</th>
<td id="nomor"></td>
</tr>

<tr>
<th>Tahun</th>
<td id="tahun"></td>
</tr>

<tr>
<th>Tentang</th>
<td id="tentang"></td>
</tr>

<tr>
<th>Tanggal Penetapan</th>
<td id="tanggal"></td>
</tr>

<tr>
<th>Pejabat yang Menetapkan</th>
<td id="pejabat"></td>
</tr>

<tr>
<th>Status</th>
<td id="status"></td>
</tr>

<tr>
<th>Hubungan Antar Peraturan</th>
<td id="hubungan"></td>
</tr>

<tr>
<th>Dokumen</th>
<td id="dokumen"></td>
</tr>

</table>

<a href="/jdih" class="btn btn-default btn-back">

<i class="fa fa-arrow-left"></i>
Kembali ke Daftar Peraturan

</a>

</div>

</div>

<script>

// ================= AMBIL ID =================

function getId(){

const params =
new URLSearchParams(window.location.search);

return params.get("id");

}

const id = getId();


// ================= URL API =================

const url =
"https://script.google.com/macros/s/AKfycbxz4T5u8G9R_mf43WjEnGBFhAWOIIiwSgNhZ0D9eqZyN3YQOnJjOY_oRoX_4CUIKV8kGQ/exec?id=" + id;


// ================= LOAD DATA =================

fetch(url)

.then(res => {

if(!res.ok){

throw new Error("HTTP Error " + res.status);

}

return res.json();

})

.then(row => {

console.log("DATA:", row);


// ================= JUDUL =================

let namaPeraturan =
row["Nama Peraturan"] || row["Tentang"] || "-";

// Judul halaman
document.getElementById("judul").innerHTML = namaPeraturan;

// Title tab browser
document.title =
"JDIH Biro PBJ - " + namaPeraturan;


// ================= DATA =================

document.getElementById("jenis").innerHTML =
row["Jenis/Bentuk Peraturan"] || "-";

document.getElementById("pemrakarsa").innerHTML =
row["Pemrakarsa"] || "-";

document.getElementById("nomor").innerHTML =
row["Nomor"] || "-";

document.getElementById("tahun").innerHTML =
row["Tahun"] || "-";

document.getElementById("tentang").innerHTML =
row["Tentang"] || "-";

document.getElementById("tanggal").innerHTML =
row["Tanggal Penetapan"] || "-";

document.getElementById("pejabat").innerHTML =
row["Pejabat yang Menetapkan"] || "-";


// ================= STATUS BADGE =================

let status = (row["Status"] || "-").toLowerCase();

let badge = "";

if(status === "tidak berlaku"){

badge =
"<span class='badge-status badge-tidak'>Tidak Berlaku</span>";

}

else if(status === "berlaku"){

badge =
"<span class='badge-status badge-berlaku'>Berlaku</span>";

}

else{

badge =
"<span class='badge-status badge-default'>" +
row["Status"] +
"</span>";

}

document.getElementById("status").innerHTML =
badge;


// ================= HUBUNGAN (NUMBERING) =================

let hubungan =
row["Hubungan antar Peraturan"] || "-";

if(hubungan.includes("<br>")){

let items = hubungan.split("<br>");

let html = "";

let listStarted = false;

items.forEach(item => {

item = item.trim();

if(item !== ""){

// Kalau "Mencabut:"
if(item.toLowerCase().includes("mencabut")){

html += item + "<br>"; // tidak double
html += "<ol>";

listStarted = true;

// Kalau "Dicabut dengan"
}else if(item.toLowerCase().includes("dicabut")){

html += item + "<br><br>"; // tambah 1 baris kosong

}else{

if(listStarted){

html += "<li>" + item + "</li>";

}else{

html += item + "<br>";

}

}

}

});

// Tutup list
if(listStarted){
html += "</ol>";
}

document.getElementById("hubungan").innerHTML =
html;

}else{

document.getElementById("hubungan").innerHTML =
hubungan;

}


// ================= DOKUMEN =================

if(row["url"]){

document.getElementById("dokumen").innerHTML =
row["url"];

}else{

document.getElementById("dokumen").innerHTML =
"<span style='color:red'>Dokumen belum tersedia</span>";

}

})

.catch(error => {

console.error("ERROR:", error);

alert("Gagal memuat data detail");

});

</script>

</body>

</html>
