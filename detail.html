<script>

// ================= AMBIL ID =================

function getId(){

const params =
new URLSearchParams(window.location.search);

return params.get("id");

}

const id = getId();



// ================= FORMAT TANGGAL =================

function formatTanggal(tgl){

if(!tgl) return "-";

const bulanIndo = [

"Januari",
"Februari",
"Maret",
"April",
"Mei",
"Juni",
"Juli",
"Agustus",
"September",
"Oktober",
"November",
"Desember"

];

const date = new Date(tgl);

if(isNaN(date)) return tgl;

// konversi ke waktu Indonesia (WIB)

const localDate =
new Date(
date.getTime() + (7 * 60 * 60 * 1000)
);

const hari =
localDate.getDate();

const bulan =
bulanIndo[
localDate.getMonth()
];

const tahun =
localDate.getFullYear();

return `${hari} ${bulan} ${tahun}`;

}



// ================= FORMAT STATUS =================

function formatStatus(status){

if(status == "Berlaku"){

return `
<span class="label label-success">
Berlaku
</span>
`;

}

if(status == "Tidak Berlaku"){

return `
<span class="label label-danger">
Tidak Berlaku
</span>
`;

}

return status;

}



// ================= URL API =================

const url =
"https://script.google.com/macros/s/AKfycbxz4T5u8G9R_mf43WjEnGBFhAWOIIiwSgNhZ0D9eqZyN3YQOnJjOY_oRoX_4CUIKV8kGQ/exec?id=" + id;



// ================= LOAD DATA =================

fetch(url)

.then(res => res.json())

.then(row => {

console.log(row); // debug kalau error



// Nama

document.getElementById("nama").innerHTML =
row["Nama Peraturan"] || row["Tentang"];



// Jenis

document.getElementById("jenis").innerHTML =
row["Jenis/Bentuk Peraturan"];



// Pemrakarsa

document.getElementById("pemrakarsa").innerHTML =
row["Pemrakarsa"];



// Nomor

document.getElementById("nomor").innerHTML =
row["Nomor"];



// Tahun

document.getElementById("tahun").innerHTML =
row["Tahun"];



// Tentang

document.getElementById("tentang").innerHTML =
row["Tentang"];



// ================= TANGGAL (FORMAT BARU)

document.getElementById("tanggal").innerHTML =
formatTanggal(
row["Tanggal Penetapan"]
);



// Pejabat

document.getElementById("pejabat").innerHTML =
row["Pejabat yang Menetapkan"];



// ================= STATUS (BADGE)

document.getElementById("status").innerHTML =
formatStatus(
row["Status"]
);



// Hubungan

document.getElementById("hubungan").innerHTML =
row["Hubungan antar Peraturan"];



// ================= DOKUMEN

if(row["url"]){

document.getElementById("dokumen").innerHTML =
row["url"];

}else{

document.getElementById("dokumen").innerHTML =
"<span style='color:red'>Dokumen belum tersedia</span>";

}

})

.catch(error => {

console.error(error);

alert("Gagal memuat data detail");

});

</script>
