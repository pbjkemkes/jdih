<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>JDIH Biro PBJ</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="favicon.png">

  <link
    rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
  />

  <link
    rel="stylesheet"
    href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap.min.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    .header-title{
        display:flex;
        align-items:center;
        gap:12px;
        margin-bottom:15px;
    }

    .header-title img{
        height:48px;
        width:auto;
    }

    .header-title h2{
        margin:0;
        font-weight:600;
        color:#2c3e50;
    }

    body {
      background: #f4f6f9;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .stat-box {
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      font-weight: bold;
      color: #2c3e50;
    }

    canvas {
      max-height: 350px;
    }

  </style>

</head>

<body>

<div class="container-fluid">

  <div class="header-title">

    <img src="logo.png">

    <h2>JDIH Biro PBJ</h2>

  </div>

  <br>

  <!-- ================= STATISTIK ================= -->

  <div class="row">

    <div class="col-md-4">

      <div class="card stat-box">

        Total Peraturan

        <div id="totalData" class="stat-number">
          0
        </div>

      </div>

    </div>

    <div class="col-md-4">

      <div class="card stat-box">

        Berlaku

        <div id="totalBerlaku" class="stat-number">
          0
        </div>

      </div>

    </div>

    <div class="col-md-4">

      <div class="card stat-box">

        Tidak Berlaku

        <div id="totalTidak" class="stat-number">
          0
        </div>

      </div>

    </div>

  </div>



  <!-- ================= TABEL ================= -->

  <div class="row">

    <div class="col-md-12">

      <div class="card">

        <h3>
          Daftar Peraturan terkait Pengadaan Barang/Jasa
        </h3>

        <table
          id="tabelPeraturan"
          class="table table-striped table-bordered"
          style="width:100%"
        >

          <thead>

            <tr>

              <th>No</th>

              <th>Nama Peraturan</th>

              <th>Tahun</th>

              <th>Status</th>

            </tr>

          </thead>

        </table>

      </div>

    </div>

  </div>



  <!-- ================= CHART ================= -->

  <div class="row">

    <div class="col-md-6">

      <div class="card">

        <h3>
          Peraturan per Tahun
        </h3>

        <canvas id="chartTahun"></canvas>

      </div>

    </div>


    <div class="col-md-6">

      <div class="card">

        <h3>
          Peraturan per Jenis
        </h3>

        <canvas id="chartJenis"></canvas>

      </div>

    </div>

  </div>

</div>

<!-- ================= LIBRARY ================= -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap.min.js"></script>



<script>

const url =
"https://script.google.com/macros/s/AKfycbxz4T5u8G9R_mf43WjEnGBFhAWOIIiwSgNhZ0D9eqZyN3YQOnJjOY_oRoX_4CUIKV8kGQ/exec";



// ================= LOAD DATA =================

fetch(url)

.then(res => res.json())

.then(result => {

  const data = result.data;



  // ================= STATISTIK =================

  document.getElementById("totalData").innerText =
    data.length;



  let berlaku = 0;

  let tidak = 0;



  data.forEach(row => {

    if (row["Status"] == "Berlaku") berlaku++;

    if (row["Status"] == "Tidak Berlaku") tidak++;

  });



  document.getElementById("totalBerlaku").innerText =
    berlaku;

  document.getElementById("totalTidak").innerText =
    tidak;



  // ================= CHART TAHUN =================

  let tahunMap = {};

  data.forEach(row => {

    let th = row["Tahun"];

    tahunMap[th] =
      (tahunMap[th] || 0) + 1;

  });



  new Chart(

    document.getElementById("chartTahun"),

    {

      type: "bar",

      data: {

        labels:
          Object.keys(tahunMap),

        datasets: [

          {

            label:
              "Jumlah Peraturan",

            data:
              Object.values(tahunMap)

          }

        ]

      }

    }

  );



  // ================= CHART JENIS =================

  let jenisMap = {};

  data.forEach(row => {

    let jenis =
      row["Jenis/Bentuk Peraturan"];

    jenisMap[jenis] =
      (jenisMap[jenis] || 0) + 1;

  });



  new Chart(

    document.getElementById("chartJenis"),

    {

      type: "pie",

      data: {

        labels:
          Object.keys(jenisMap),

        datasets: [

          {

            data:
              Object.values(jenisMap)

          }

        ]

      }

    }

  );

});



// ================= DATATABLE =================

$(document).ready(function () {

  $("#tabelPeraturan").DataTable({

    ajax: {

      url: url,

      dataSrc: "data"

    },

    pageLength: 10,

    lengthMenu: [10, 25, 50, 100],

    order: [[2, "desc"]],

    columns: [

      {
        data: "id"
      },

      {

        data: "Nama Peraturan",

        render: function(data, type, row){

          if(!data)
            data = row["Nama Peraturan"];

          return `
            <a href="detail.html?id=${row.id}">
              ${data}
            </a>
          `;

        }

      },

      {
        data: "Tahun"
      },

      {
        data: "Status"
      }

    ],

    language: {

      lengthMenu:
        "Tampilkan _MENU_ peraturan",

      zeroRecords:
        "Data tidak ditemukan",

      info:
        "Menampilkan _START_ sampai _END_ dari _TOTAL_ peraturan",

      infoEmpty:
        "Tidak ada data",

      search:
        "Cari:",

      paginate: {

        next:
          "Berikutnya",

        previous:
          "Sebelumnya"

      }

    }

  });

});

</script>

</body>

</html>
