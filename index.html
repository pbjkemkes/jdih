<!DOCTYPE html>
<html>

  <head>

    <meta charset="UTF-8">

    <title>JDIH Biro PBJ</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png" href="favicon.png">

    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link
      rel="stylesheet"
      href="/jdih/css/stael-1105.css"
    />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  </head>

  <body>

    <div class="container-fluid">

<!-- ================= HEADER ================= -->

      <div class="header-title">

      <img src="logo.png" alt="Logo Kemenkes">

      <h2>JDIH Biro PBJ</h2>

      </div>

<!-- ================= STATISTIK ================= -->

      <div class="row">

        <div class="col-md-4">

          <div class="card stat-box stat-total">

            <div class="stat-title">
            Jumlah Peraturan
            </div>

            <div id="totalData" class="stat-number">
            0
            </div>

          </div>

        </div>

        <div class="col-md-4">

          <div class="card stat-box stat-berlaku">

            <div class="stat-title">
            Berlaku
            </div>

            <div id="totalBerlaku" class="stat-number">
            0
            </div>

          </div>

        </div>

      <div class="col-md-4">

        <div class="card stat-box stat-tidak">

          <div class="stat-title">
          Tidak Berlaku
          </div>

          <div id="totalTidak" class="stat-number">
          0
          </div>

        </div>

      </div>

    </div>


<!-- ================= TABEL ================= -->

      <div class="row">

        <div class="col-md-12">

          <div class="card">

          <h3>
          Peraturan terkait Pengadaan Barang/Jasa
          </h3>

          <table
          id="tabelPeraturan"
          class="table table-striped table-bordered"
          style="width:100%"
          >

            <thead>

              <tr>

              <th>No</th>
              <th>Nama Peraturan</th>
              <th>Jenis</th>
              <th>Tanggal</th>
              <th>Unduh</th>

              </tr>

            </thead>

          </table>

          </div>

        </div>

      </div>



<!-- ================= CHART ================= -->

      <div class="row">

      <div class="col-md-6">

      <div class="card">

      <h3>
      Peraturan per Tahun
      </h3>

      <canvas id="chartTahun"></canvas>

      </div>

    </div>


    <div class="col-md-6">

      <div class="card">

      <h3>
      Peraturan per Jenis
      </h3>

      <canvas id="chartJenis"></canvas>

      </div>

    </div>

  </div>

</div>



<!-- ================= LIBRARY ================= -->

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap.min.js"></script>

<script src="/jdih/js/skrip-1253.js"></script>

<!-- ================= FOOTER ================= -->

<footer class="footer">

<div class="container-fluid text-center">

<p>
&copy; <span id="tahun"></span> 
Biro Pengadaan Barang dan Jasa
</p>

</div>

</footer>

<script>

document.getElementById("tahun").innerText =
new Date().getFullYear();

</script>
    
</body>

</html>
